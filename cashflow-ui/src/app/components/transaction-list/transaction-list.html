<div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mt-8">
  
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-xl font-bold text-gray-800">Histórico de Transações</h2>
    
    <a routerLink="/nova-transacao" class="text-sm bg-blue-50 text-blue-600 px-4 py-2 rounded-lg font-semibold hover:bg-blue-100 transition">
      + Adicionar
    </a>
  </div>

  <div class="overflow-x-auto">
    <table class="w-full text-left border-collapse">
      
      <thead>
        <tr class="border-b border-gray-200 text-gray-500 text-sm uppercase tracking-wider">
          <th class="pb-3 font-semibold">Descrição</th>
          <th class="pb-3 font-semibold">Categoria</th>
          <th class="pb-3 font-semibold">Data</th>
          <th class="pb-3 font-semibold text-right">Valor</th>
        </tr>
      </thead>

      <tbody class="text-gray-700">
        
        <tr *ngFor="let t of transacoes" class="border-b border-gray-100 hover:bg-gray-50 transition">
          
          <td class="py-4 font-medium">{{ t.descricao }}</td>
          
          <td class="py-4">
            <span class="px-3 py-1 text-xs rounded-full font-medium"
                  [ngClass]="{'bg-green-100 text-green-700': t.tipo === 'RECEITA', 'bg-red-100 text-red-700': t.tipo === 'DESPESA'}">
              {{ t.categoria?.nome }}
            </span>
          </td>
          
          <td class="py-4">{{ t.data | date:'dd/MM/yyyy' }}</td>
          
          <td class="py-4 text-right font-bold"
              [ngClass]="{'text-green-500': t.tipo === 'RECEITA', 'text-red-500': t.tipo === 'DESPESA'}">
            {{ t.valor | currency:'BRL':'symbol':'1.2-2' }}
          </td>
          
        </tr>

      </tbody>
    </table>
  </div>

  <div *ngIf="transacoes.length === 0" class="text-center py-8 text-gray-500">
    Nenhuma transação encontrada.
  </div>

</div>
